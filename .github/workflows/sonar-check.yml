name: Sonar Check
on:
  push:
    branches:
      - main
  pull_request:
   branches:
      - main
  workflow_call:

env:
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  POSTGRES_DB: lunae
  POSTGRES_USER: fev-23
  POSTGRES_PASSWORD: fev-23

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: lunae
          POSTGRES_USER: fev-23
          POSTGRES_PASSWORD: fev-23
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests with coverage
        env:
          POSTGRES_DB: lunae
          POSTGRES_USER: fev-23
          POSTGRES_PASSWORD: fev-23
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          DJANGO_SETTINGS_MODULE: api.settings
        run: |
          pytest --cov=api --cov-report=xml
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
